<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>강화 시뮬레이터 (재화 시스템 적용)</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="background-effect"></div>
    <div class="container">
        <header>
            <div class="header-top">
                <h1 id="weaponName">녹슨 단검</h1>
                <div class="gold-display">
                    💰 <span id="goldText">10,000</span> G
                </div>
            </div>
            <p class="subtitle">MAX LEVEL: +15</p>
        </header>

        <main>
            <div class="weapon-display" id="weaponDisplay">
                <div class="weapon-glow" id="weaponGlow"></div>
                <img src="sword.png" alt="Weapon" id="weaponImage" onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/4/4c/Sword.svg'; this.style.filter='invert(1)'">
                <div class="level-badge">
                    <span id="weaponLevel">+0</span>
                </div>
            </div>

            <div class="info-panel glass-panel">
                <div class="stats mb-3">
                    <div class="stat-box">
                        <span class="stat-label">성공</span>
                        <span class="stat-value text-success" id="rateSuccess">100%</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-label">실패/유지</span>
                        <span class="stat-value text-warning" id="rateFail">0%</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-label">파괴</span>
                        <span class="stat-value text-danger" id="rateDestroy">0%</span>
                    </div>
                </div>
                <div class="value-info">
                    <div class="value-box">
                        <span>강화 비용:</span>
                        <span class="text-cost" id="enhanceCostText">-100 G</span>
                    </div>
                    <div class="value-box">
                        <span>현재 가치:</span>
                        <span class="text-sell" id="sellValueText">+500 G</span>
                    </div>
                </div>
            </div>

            <div class="action-panel">
                <div class="btn-group">
                    <button id="btnEnhance" class="btn-enhance">
                        <span class="btn-text">강화하기</span>
                        <div class="btn-particles"></div>
                    </button>
                    <button id="btnSell" class="btn-sell">
                        <span class="btn-text">판매하기</span>
                    </button>
                </div>
                <button id="btnReset" class="btn-reset" style="display: none;">
                    새로운 검 가져오기
                </button>
            </div>

            <div class="log-panel glass-panel">
                <h3>강화 기록</h3>
                <ul id="logList" class="log-list">
                    <li><span class="log-info">게임을 시작합니다. 강력한 검을 만들어 부자가 되어보세요!</span></li>
                </ul>
            </div>
        </main>
    </div>

    <div id="effectContainer"></div>

    <script src="script.js"></script>
</body>
</html>
